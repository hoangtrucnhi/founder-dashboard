<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopMinutes Stream Overlay - Minimal Vertical</title>
    <!-- Google Fonts & Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: rgba(0, 0, 0, 0); /* Nền trong suốt hoàn toàn cho OBS Browser Source */
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        /* Hiệu ứng Glassmorphism tối giản */
        .glass-card {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
        }
        /* Hiệu ứng số đếm to lên nhẹ theo nhịp giây */
        .timer-beat {
            animation: beat 1s infinite alternate;
        }
        @keyframes beat {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }
        /* Animation cho Pop-up hiện tin nhắn */
        .popup-slide {
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .popup-slide.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="w-[450px] h-[900px] flex flex-col justify-between p-6">

    <!-- KHU VỰC HIỂN THỊ TRÊN STREAM (Bố cục dọc từ trên xuống) -->
    <div class="space-y-4 w-full">
        
        <!-- BLOCK 1: POMODORO TIMER ĐƠN GIẢN -->
        <div class="glass-card rounded-3xl p-6 text-center relative overflow-hidden">
            <!-- Hiển thị Trạng thái hiện tại -->
            <div id="current-phase" class="text-xs font-extrabold uppercase tracking-widest text-indigo-400 bg-indigo-500/10 px-4 py-1.5 rounded-full inline-block mb-2">
                FOCUS
            </div>
            
            <!-- Số đếm cực đại -->
            <div id="timer-display" class="text-7xl font-extrabold tracking-tight text-white tabular-nums my-2 timer-beat">
                25:00
            </div>
            
            <div id="cycle-display" class="text-[11px] text-slate-400 font-medium">
                Cycle: #1
            </div>
        </div>

        <!-- BLOCK 2: TARGET & % ACHIEVEMENT -->
        <div class="glass-card rounded-3xl p-5 space-y-3">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-slate-300 uppercase tracking-wider flex items-center gap-1.5">
                    <i data-lucide="target" class="w-4 h-4 text-rose-400"></i> Session Target
                </span>
                <!-- Phần trăm thành tựu -->
                <span id="achievement-percent" class="text-sm font-extrabold text-rose-400">0%</span>
            </div>
            
            <!-- Ô nhập nội dung mục tiêu trực tiếp cho streamer tiện đổi đề tài -->
            <input type="text" id="target-input" class="w-full bg-black/20 border border-white/5 rounded-xl px-3 py-2 text-xs text-white placeholder-slate-500 focus:outline-none focus:border-rose-500/50" 
                value="Summarizing Meeting & Lecture Minutes with PopMinutes">

            <!-- Progress Bar -->
            <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden border border-white/5">
                <div id="achievement-bar" class="h-full bg-gradient-to-r from-rose-500 to-indigo-500 w-0 transition-all duration-500 rounded-full"></div>
            </div>
            
            <!-- Nút tăng giảm nhanh % ngay trên stream -->
            <div class="flex justify-end gap-2 pt-1">
                <button onclick="adjustProgress(-10)" class="px-2 py-1 bg-white/5 hover:bg-white/10 text-[10px] text-slate-400 rounded border border-white/5">-10%</button>
                <button onclick="adjustProgress(10)" class="px-2 py-1 bg-white/5 hover:bg-white/10 text-[10px] text-slate-400 rounded border border-white/5">+10%</button>
            </div>
        </div>

        <!-- BLOCK 3: POP-UP THOUGHTS CHỈ XUẤT HIỆN KHI ẤN NÚT -->
        <div id="stream-popup" class="glass-card rounded-2xl p-4 border-l-4 border-l-indigo-400 popup-slide">
            <div class="flex items-start gap-3">
                <div class="p-1.5 bg-indigo-500/10 rounded-lg mt-0.5">
                    <i data-lucide="message-square" class="w-4 h-4 text-indigo-400"></i>
                </div>
                <div>
                    <h4 class="text-[10px] font-bold text-indigo-300 uppercase tracking-widest">Streamer's Note</h4>
                    <p id="popup-text" class="text-xs text-slate-200 mt-1 leading-relaxed font-medium">
                        Welcome to my work space! Drop your questions in chat.
                    </p>
                </div>
            </div>
        </div>

    </div>

    <!-- KHU VỰC BẢNG ĐIỀU KHIỂN NGẦM (Ẩn với người xem nếu cậu crop màn hình hoặc dùng Interact) -->
    <div class="w-full border-t border-white/10 pt-4 mt-4 bg-slate-950/80 p-4 rounded-2xl space-y-3 no-obs">
        <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider flex items-center gap-1">
            <i data-lucide="sliders" class="w-3 h-3"></i> Streamer Control Panel
        </div>
        
        <!-- Bộ điều khiển Pomodoro -->
        <div class="flex gap-2">
            <button onclick="toggleTimer()" id="btn-play" class="flex-1 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-xs font-bold text-white rounded-xl transition flex items-center justify-center gap-1">
                <i data-lucide="play" class="w-3 h-3 fill-white" id="icon-play"></i> Start/Pause
            </button>
            <button onclick="resetTimer()" class="p-1.5 bg-white/5 hover:bg-white/10 text-slate-300 rounded-xl border border-white/10 transition">
                <i data-lucide="rotate-ccw" class="w-3 h-3"></i>
            </button>
            <button onclick="skipTimer()" class="p-1.5 bg-white/5 hover:bg-white/10 text-slate-300 rounded-xl border border-white/10 transition">
                <i data-lucide="skip-forward" class="w-3 h-3"></i>
            </button>
        </div>

        <!-- Bộ gõ tin nhắn Thoughts xuất bản ngầm -->
        <div class="space-y-1.5">
            <textarea id="thoughts-input" class="w-full bg-black/40 border border-white/10 rounded-xl p-2 text-xs text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 resize-none h-12"
                placeholder="Type your thought here and click Publish..."></textarea>
            <div class="flex gap-2">
                <button onclick="publishThought()" class="flex-1 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-xs font-bold text-white rounded-xl transition flex items-center justify-center gap-1">
                    <i data-lucide="send" class="w-3 h-3"></i> Publish to Stream
                </button>
                <button onclick="clearThought()" class="py-1.5 px-3 bg-rose-600/20 hover:bg-rose-600/30 text-xs font-bold text-rose-400 rounded-xl transition">
                    Hide
                </button>
            </div>
        </div>
    </div>

    <!-- Âm thanh hệ thống báo chu kỳ -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>

    <script>
        // --- ĐỊNH NGHĨA CHU KỲ POMODORO ---
        const MODES = {
            FOCUS: { name: 'FOCUS', minutes: 25 },
            SHORT: { name: 'SHORT BREAK', minutes: 5 },
            LONG: { name: 'LONG BREAK', minutes: 15 }
        };

        let currentMode = MODES.FOCUS;
        let timer = null;
        let timeRemaining = currentMode.minutes * 60;
        let currentCycle = 1;
        let isRunning = false;
        let currentProgress = 0;

        const timerDisplay = document.getElementById('timer-display');
        const currentPhaseElement = document.getElementById('current-phase');
        const cycleDisplay = document.getElementById('cycle-display');
        const iconPlay = document.getElementById('icon-play');

        function updateTimerDisplay() {
            const mins = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const secs = String(timeRemaining % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        function updateGauges() {
            currentPhaseElement.textContent = currentMode.name;
            cycleDisplay.textContent = `Cycle: #${currentCycle}`;
            
            // Đổi màu sắc theo trạng thái cho đẹp mắt
            if (currentMode === MODES.FOCUS) {
                currentPhaseElement.className = "text-xs font-extrabold uppercase tracking-widest text-indigo-400 bg-indigo-500/10 px-4 py-1.5 rounded-full inline-block mb-2";
                timerDisplay.className = "text-7xl font-extrabold tracking-tight text-white tabular-nums my-2 timer-beat";
            } else {
                currentPhaseElement.className = "text-xs font-extrabold uppercase tracking-widest text-emerald-400 bg-emerald-500/10 px-4 py-1.5 rounded-full inline-block mb-2";
                timerDisplay.className = "text-7xl font-extrabold tracking-tight text-emerald-400 tabular-nums my-2";
            }
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                iconPlay.setAttribute('data-lucide', 'play');
                isRunning = false;
            } else {
                isRunning = true;
                iconPlay.setAttribute('data-lucide', 'pause');
                timer = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        handlePhaseEnd();
                    }
                }, 1000);
            }
            lucide.createIcons();
        }

        function handlePhaseEnd() {
            document.getElementById('alert-sound').play().catch(e => console.log("Audio play blocked"));
            clearInterval(timer);
            isRunning = false;

            if (currentMode === MODES.FOCUS) {
                if (currentCycle % 4 === 0) {
                    currentMode = MODES.LONG;
                } else {
                    currentMode = MODES.SHORT;
                }
            } else {
                currentCycle++;
                currentMode = MODES.FOCUS;
            }

            timeRemaining = currentMode.minutes * 60;
            iconPlay.setAttribute('data-lucide', 'play');
            
            updateGauges();
            updateTimerDisplay();
            lucide.createIcons();
            toggleTimer(); // Chạy tiếp chu kỳ mới tự động
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            timeRemaining = currentMode.minutes * 60;
            iconPlay.setAttribute('data-lucide', 'play');
            updateTimerDisplay();
            lucide.createIcons();
        }

        function skipTimer() {
            clearInterval(timer);
            isRunning = false;
            handlePhaseEnd();
        }

        // --- BỘ QUẢN LÝ % ACHIEVEMENT ---
        const achievementPercent = document.getElementById('achievement-percent');
        const achievementBar = document.getElementById('achievement-bar');

        function adjustProgress(amount) {
            currentProgress += amount;
            if (currentProgress < 0) currentProgress = 0;
            if (currentProgress > 100) currentProgress = 100;
            
            achievementPercent.textContent = `${currentProgress}%`;
            achievementBar.style.width = `${currentProgress}%`;
        }

        // --- ĐIỀU KHIỂN POP-UP THOUGHTS NGẦM ---
        const thoughtsInput = document.getElementById('thoughts-input');
        const popupText = document.getElementById('popup-text');
        const streamPopup = document.getElementById('stream-popup');

        function publishThought() {
            const text = thoughtsInput.value.trim();
            if (text !== "") {
                popupText.textContent = text;
                streamPopup.classList.add('show');
            }
        }

        function clearThought() {
            streamPopup.classList.remove('show');
        }

        // Khởi tạo hệ thống ban đầu
        lucide.createIcons();
        updateTimerDisplay();
        updateGauges();
    </script>
</body>
</html>
