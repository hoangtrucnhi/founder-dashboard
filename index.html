<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopMinutes Space - Stream Overlay Dashboard</title>
    <!-- Google Fonts & Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            transition: background 0.3s ease;
        }
        /* OBS Mode - Chroma Key Background */
        body.obs-mode {
            background: #00ff00 !important; /* Xanh lá Chroma để lọc nền OBS */
        }
        body.obs-mode .no-obs {
            display: none !important;
        }
        /* Hiệu ứng Glassmorphism đỉnh cao */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        /* Progress Bar Animation */
        .progress-bar {
            transition: width 1s linear;
        }
        /* Custom Scrollbar cho phần ghi chú */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 overflow-hidden relative">

    <!-- Lớp phủ trang trí khi chạy chế độ thường -->
    <div class="absolute top-[-20%] left-[-10%] w-[500px] h-[500px] bg-indigo-500/10 rounded-full blur-[120px] no-obs"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-rose-500/10 rounded-full blur-[120px] no-obs"></div>

    <!-- MAIN CONTAINER -->
    <div class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-12 gap-6 relative z-10">
        
        <!-- CỘT TRÁI: ĐỒNG HỒ & POMODORO (8 Cột) -->
        <div class="md:col-span-7 space-y-6 flex flex-col justify-between">
            
            <!-- Widget 1: Đồng hồ hệ thống & OBS Controller -->
            <div class="glass-panel rounded-3xl p-6 flex justify-between items-center transition-all duration-300 hover:scale-[1.01]">
                <div>
                    <p class="text-xs font-semibold uppercase tracking-widest text-slate-400">Hệ thống thời gian</p>
                    <h1 id="live-clock" class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-slate-400 mt-1">00:00:00</h1>
                </div>
                <button onclick="toggleObsMode()" class="px-4 py-2 text-xs font-medium bg-white/5 border border-white/10 hover:bg-white/10 text-white rounded-full transition flex items-center gap-2">
                    <i data-lucide="video" class="w-4 h-4 text-emerald-400"></i> OBS Chroma Mode
                </button>
            </div>

            <!-- Widget 2: Trọng tâm Pomodoro Core -->
            <div class="glass-panel rounded-3xl p-8 flex flex-col justify-center items-center relative overflow-hidden flex-grow min-h-[350px]">
                
                <!-- Các thẻ trạng thái -->
                <div class="flex gap-2 mb-6 bg-black/20 p-1.5 rounded-full border border-white/5">
                    <span id="badge-focus" class="px-4 py-1.5 rounded-full text-xs font-semibold transition-all duration-300 bg-indigo-500 text-white">Focus</span>
                    <span id="badge-short" class="px-4 py-1.5 rounded-full text-xs font-semibold text-slate-400 transition-all duration-300">Short Break</span>
                    <span id="badge-long" class="px-4 py-1.5 rounded-full text-xs font-semibold text-slate-400 transition-all duration-300">Long Break</span>
                </div>

                <!-- Đồng hồ đếm ngược lớn -->
                <div id="timer-display" class="text-7xl font-bold tracking-tight text-white my-4 tabular-nums animate-pulse">25:00</div>
                <p id="cycle-count" class="text-xs text-indigo-300 font-medium mb-6">Chu kỳ: #1</p>

                <!-- Thanh tiến độ chạy mượt -->
                <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden mb-8 border border-white/5">
                    <div id="progress-indicator" class="progress-bar h-full bg-gradient-to-r from-indigo-500 to-rose-500 w-full rounded-full"></div>
                </div>

                <!-- Bộ điều khiển máy (Controls) -->
                <div class="flex items-center gap-4">
                    <button onclick="resetTimer()" class="p-3 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 hover:text-white rounded-full transition active:scale-95" title="Reset">
                        <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                    </button>
                    <button onclick="toggleTimer()" id="btn-play" class="p-5 bg-gradient-to-r from-indigo-500 to-indigo-600 hover:from-indigo-600 hover:to-indigo-700 text-white rounded-full shadow-lg shadow-indigo-500/20 transition active:scale-95" title="Start / Pause">
                        <i data-lucide="play" class="w-6 h-6 fill-white" id="icon-play"></i>
                    </button>
                    <button onclick="skipTimer()" class="p-3 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 hover:text-white rounded-full transition active:scale-95" title="Bỏ qua">
                        <i data-lucide="skip-forward" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- CỘT PHẢI: AI LIVE SMART NOTES FOR STREAM (5 Cột) -->
        <div class="md:col-span-5 flex flex-col">
            <div class="glass-panel rounded-3xl p-6 flex flex-col h-full min-h-[450px]">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-2.5 h-2.5 bg-rose-500 rounded-full animate-ping"></div>
                    <h3 class="text-sm font-bold text-white tracking-wide uppercase flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-4 h-4 text-indigo-400"></i> AI Smart Notes
                    </h3>
                </div>
                <p class="text-xs text-slate-400 mb-4">Tóm tắt bài giảng & ý chính cuộc họp thông minh thời gian thực.</p>
                
                <!-- Khu vực gõ trực tiếp của Streamer (Nội dung tự đồng bộ lên màn hình) -->
                <textarea id="live-notes" class="w-full flex-grow bg-black/20 border border-white/5 rounded-2xl p-4 text-sm text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500/50 resize-none transition" 
                    placeholder="👉 [Nhập tiêu đề cuộc họp/môn học ở đây]&#10;- Ý chính 1: Nội dung đúc kết từ cuộc thảo luận...&#10;- Ý chính 2: Hành động tiếp theo là gì?...&#10;&#10;(Mẹo: Gõ nội dung tóm tắt tại đây, người xem Livestream sẽ nhìn thấy trực tiếp theo phong cách làm việc chuyên nghiệp!)"></textarea>
                
                <div class="mt-4 flex justify-between items-center text-[11px] text-slate-500 border-t border-white/5 pt-3">
                    <span class="flex items-center gap-1"><i data-lucide="cpu" class="w-3 h-3"></i> Powered by PopMinutes</span>
                    <span id="char-count">0 ký tự</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Âm thanh báo hiệu hệ thống -->
    <audio id="alert-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>

    <script>
        // --- ĐỒNG HỒ HỆ THỐNG ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('live-clock').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- CẤU HÌNH TRẠNG THÁI POMODORO ---
        const MODES = {
            FOCUS: { name: 'Focus', minutes: 25, id: 'badge-focus' },
            SHORT: { name: 'Short Break', minutes: 5, id: 'badge-short' },
            LONG: { name: 'Long Break', minutes: 15, id: 'badge-long' }
        };

        let currentMode = MODES.FOCUS;
        let timer = null;
        let timeRemaining = currentMode.minutes * 60;
        let currentCycle = 1;
        let isRunning = false;

        const timerDisplay = document.getElementById('timer-display');
        const progressIndicator = document.getElementById('progress-indicator');
        const iconPlay = document.getElementById('icon-play');
        const cycleCountElement = document.getElementById('cycle-count');

        // Cập nhật giao diện đồng hồ Pomodoro
        function updateTimerDisplay() {
            const mins = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const secs = String(timeRemaining % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
            
            // Tính toán thanh tiến độ mượt mà
            const totalSeconds = currentMode.minutes * 60;
            const progressPercent = (timeRemaining / totalSeconds) * 100;
            progressIndicator.style.width = `${progressPercent}%`;
        }

        // Đổi thẻ trạng thái sáng lên
        function updateBadges() {
            Object.values(MODES).forEach(mode => {
                const badge = document.getElementById(mode.id);
                if (mode.id === currentMode.id) {
                    badge.classList.add('bg-indigo-500', 'text-white');
                    badge.classList.remove('text-slate-400');
                } else {
                    badge.classList.remove('bg-indigo-500', 'text-white');
                    badge.classList.add('text-slate-400');
                }
            });
            cycleCountElement.textContent = `Chu kỳ Focus: #${currentCycle}`;
        }

        // Khởi động / Tạm dừng
        function toggleTimer() {
            if (isRunning) {
                clearInterval(timer);
                iconPlay.setAttribute('data-lucide', 'play');
                timerDisplay.classList.remove('animate-pulse');
                isRunning = false;
            } else {
                isRunning = true;
                iconPlay.setAttribute('data-lucide', 'pause');
                timerDisplay.classList.add('animate-pulse');
                timer = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        handlePhaseEnd();
                    }
                }, 1000);
            }
            lucide.createIcons();
        }

        // Tự động chuyển đổi chu kỳ thông minh
        function handlePhaseEnd() {
            document.getElementById('alert-sound').play().catch(e => console.log("Audio play blocked"));
            clearInterval(timer);
            isRunning = false;

            if (currentMode === MODES.FOCUS) {
                if (currentCycle % 4 === 0) {
                    currentMode = MODES.LONG;
                } else {
                    currentMode = MODES.SHORT;
                }
            } else {
                if (currentMode === MODES.LONG || currentMode === MODES.SHORT) {
                    currentCycle++;
                }
                currentMode = MODES.FOCUS;
            }

            timeRemaining = currentMode.minutes * 60;
            iconPlay.setAttribute('data-lucide', 'play');
            timerDisplay.classList.remove('animate-pulse');
            
            updateBadges();
            updateTimerDisplay();
            lucide.createIcons();
            
            // Tự động chạy tiếp chu kỳ mới trên livestream không gián đoạn
            toggleTimer();
        }

        // Nút Reset
        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            timeRemaining = currentMode.minutes * 60;
            iconPlay.setAttribute('data-lucide', 'play');
            timerDisplay.classList.remove('animate-pulse');
            updateTimerDisplay();
            lucide.createIcons();
        }

        // Nút Skip
        function skipTimer() {
            clearInterval(timer);
            isRunning = false;
            handlePhaseEnd();
        }

        // --- ĐẾM KÝ TỰ NOTES ---
        const liveNotes = document.getElementById('live-notes');
        const charCount = document.getElementById('char-count');
        liveNotes.addEventListener('input', (e) => {
            charCount.textContent = `${e.target.value.length} ký tự`;
        });

        // --- CHẾ ĐỘ OBS CHROMA OVERLAY ---
        function toggleObsMode() {
            document.body.classList.toggle('obs-mode');
        }

        // Khởi tạo icons ban đầu
        lucide.createIcons();
        updateBadges();
        updateTimerDisplay();
    </script>
</body>
</html>
