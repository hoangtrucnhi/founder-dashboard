<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PopMinutes Balanced Ultra-Large Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2=family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: rgba(0, 0, 0, 0); /* Trong suốt cho OBS */
            margin: 0;
            padding: 16px;
            overflow: hidden;
            display: flex;
            align-items: start;
            gap: 24px;
            width: 100%;
        }
        /* Phong cách Business Glass */
        .business-card {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }
        .popup-transition {
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .popup-transition.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Ẩn điều khiển ở kích thước Live, chỉ hiện khi kéo rộng cửa sổ Interact trên 450px */
        #control-panel {
            display: none;
            opacity: 0;
            width: 0;
            transition: opacity 0.3s ease;
        }
        @media (min-width: 450px) {
            #control-panel {
                display: block;
                opacity: 1;
                width: 430px;
            }
        }
    </style>
</head>
<body>

    <div class="w-[430px] space-y-5 flex-shrink-0">
        
        <div class="business-card rounded-2xl p-6 text-center relative overflow-hidden space-y-4">
            <div id="current-phase" class="w-full text-3xl font-black uppercase tracking-wider text-blue-400 bg-blue-500/10 border-2 border-blue-500/30 py-3 rounded-xl block">
                FOCUS PHASE
            </div>
            <div id="timer-display" class="text-8xl font-light tracking-tighter text-white tabular-nums my-2">
                25:00
            </div>
            <div id="cycle-display" class="text-base text-slate-400 font-black tracking-widest uppercase">
                Session Cycle: #1
            </div>
        </div>

        <div class="business-card rounded-2xl p-6 space-y-4">
            <div class="flex justify-between items-center border-b border-white/10 pb-3">
                <span class="text-xl font-black text-slate-200 uppercase tracking-wide flex items-center gap-2">
                    <i data-lucide="briefcase" class="w-6 h-6 text-blue-400"></i> Current Objective
                </span>
                <span id="achievement-percent" class="text-xl font-black text-blue-400 tabular-nums">0%</span>
            </div>
            <div id="objective-text" class="text-xl font-extrabold text-white bg-black/50 px-4 py-4 rounded-xl border border-white/10 leading-snug min-h-[60px] tracking-wide">
                Workspace and Meeting Minutes Analytics Execution
            </div>
            <div class="w-full bg-white/10 h-3 rounded-full overflow-hidden">
                <div id="achievement-bar" class="h-full bg-blue-500 w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div id="stream-popup" class="business-card rounded-2xl p-5 border-l-4 border-l-blue-400 popup-transition space-y-3">
            <div class="flex items-center gap-3 border-b border-white/10 pb-2">
                <div class="p-2 bg-blue-500/10 rounded-lg">
                    <i data-lucide="megaphone" class="w-6 h-6 text-blue-400"></i>
                </div>
                <h4 class="text-xl font-black text-blue-400 uppercase tracking-wide">Streamer's Thoughts</h4>
            </div>
            <p id="popup-text" class="text-xl text-slate-100 leading-snug font-extrabold tracking-wide">
                Awaiting brief updates...
            </p>
        </div>

    </div>

    <div id="control-panel" class="bg-slate-900 border border-white/15 rounded-2xl p-5 space-y-4 shadow-2xl flex-shrink-0 mt-1">
        <div class="text-[11px] font-bold text-slate-400 uppercase tracking-wider flex items-center justify-between border-b border-white/10 pb-2">
            <span class="flex items-center gap-1.5"><i data-lucide="sliders" class="w-4 h-4 text-blue-400"></i> Streamer Control Dashboard</span>
            <span class="text-[9px] bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded font-mono border border-blue-500/30">Interact Window Open</span>
        </div>
        
        <div class="space-y-1.5">
            <label class="text-[11px] font-semibold text-slate-300 flex items-center gap-1">
                <i data-lucide="edit-3" class="w-3.5 h-3.5"></i> Edit Current Objective:
            </label>
            <input type="text" id="target-input" class="w-full bg-black/40 border border-white/20 rounded px-3 py-2 text-xs text-white focus:outline-none focus:border-blue-500 transition" 
                value="Workspace and Meeting Minutes Analytics Execution" oninput="document.getElementById('objective-text').textContent = this.value">
        </div>

        <div class="flex items-center justify-between bg-black/20 p-3 rounded border border-white/5">
            <span class="text-xs text-slate-300 font-medium">Adjust Progress Milestone:</span>
            <div class="flex gap-2">
                <button onclick="adjustProgress(-10)" class="px-4 py-1.5 bg-slate-800 hover:bg-slate-700 active:bg-slate-600 text-xs font-bold text-white rounded border border-white/20 transition shadow">
                    -10%
                </button>
                <button onclick="adjustProgress(10)" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-xs font-bold text-white rounded border border-blue-400 transition shadow">
                    +10%
                </button>
            </div>
        </div>
        
        <div class="space-y-1.5">
            <label class="text-[11px] font-semibold text-slate-300"><i data-lucide="clock" class="w-3.5 h-3.5 inline mr-1"></i> Timer Management:</label>
            <div class="grid grid-cols-3 gap-2">
                <button onclick="toggleTimer()" id="btn-play" class="col-span-2 py-2.5 bg-white hover:bg-slate-100 text-slate-950 text-xs font-bold rounded transition flex items-center justify-center gap-1.5 shadow-md">
                    <i data-lucide="play" class="w-4 h-4 fill-slate-950" id="icon-play"></i> <span id="text-play">Start Timer</span>
                </button>
                <div class="flex gap-1">
                    <button onclick="resetTimer()" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded border border-white/10 flex items-center justify-center transition" title="Reset">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                    </button>
                    <button onclick="skipTimer()" class="flex-1 py-2.5 bg-slate-800 hover:bg-slate-700 text-white rounded border border-white/10 flex items-center justify-center transition" title="Skip">
                        <i data-lucide="skip-forward" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
            <button onclick="playAlertSound()" class="w-full mt-1 py-1 bg-slate-800 hover:bg-slate-700 text-[10px] text-slate-400 rounded transition border border-white/5">
                🎵 Click to Test Notification Sound
            </button>
        </div>

        <div class="space-y-2 border-t border-white/5 pt-3">
            <label class="text-[11px] font-semibold text-slate-300 flex items-center gap-1">
                <i data-lucide="megaphone" class="w-3.5 h-3.5 text-emerald-400"></i> Broadcast Instant Thought:
            </label>
            <div class="flex gap-2">
                <input type="text" id="thoughts-input" class="flex-1 bg-black/40 border border-white/20 rounded px-3 py-2 text-xs text-slate-200 focus:outline-none focus:border-blue-500"
                    placeholder="Type message to pop up on screen...">
                <button onclick="publishThought()" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 text-xs font-bold text-white rounded transition flex items-center gap-1 shadow">
                    <i data-lucide="send" class="w-3.5 h-3.5"></i> Publish
                </button>
                <button onclick="clearThought()" class="px-3 py-2 bg-slate-800 hover:bg-slate-700 text-xs font-medium text-slate-300 rounded border border-white/10 transition">
                    Hide
                </button>
            </div>
        </div>
    </div>

    <audio id="alert-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script>
        // --- POMODORO CORE CONFIG ---
        const MODES = {
            COUNTDOWN: { name: 'PREPARE PHASE', seconds: 10, isPrep: true },
            FOCUS: { name: 'FOCUS PHASE', minutes: 25 },
            SHORT: { name: 'SHORT BREAK', minutes: 5 }
        };

        let currentMode = MODES.FOCUS;
        let timer = null;
        let timeRemaining = currentMode.minutes * 60;
        let currentCycle = 1;
        let isRunning = false;
        let currentProgress = 0;
        let hasInitializedPrep = false; // Đánh dấu kiểm soát nút Start lần đầu

        const timerDisplay = document.getElementById('timer-display');
        const currentPhaseElement = document.getElementById('current-phase');
        const cycleDisplay = document.getElementById('cycle-display');
        const iconPlay = document.getElementById('icon-play');
        const textPlay = document.getElementById('text-play');
        const alertSound = document.getElementById('alert-sound');

        function updateTimerDisplay() {
            const mins = String(Math.floor(timeRemaining / 60)).padStart(2, '0');
            const secs = String(timeRemaining % 60).padStart(2, '0');
            timerDisplay.textContent = `${mins}:${secs}`;
        }

        function updateGauges() {
            currentPhaseElement.textContent = currentMode.name;
            cycleDisplay.textContent = `Session Cycle: #${currentCycle}`;
            
            if (currentMode.isPrep) {
                // Màu vàng hổ phách đặc thù cho 10 giây chuẩn bị
                currentPhaseElement.className = "w-full text-3xl font-black uppercase tracking-wider text-amber-400 bg-amber-500/10 border-2 border-amber-500/30 py-3 rounded-xl block";
                timerDisplay.className = "text-8xl font-light tracking-tighter text-amber-400 tabular-nums my-2";
            } else if (currentMode === MODES.FOCUS) {
                currentPhaseElement.className = "w-full text-3xl font-black uppercase tracking-wider text-blue-400 bg-blue-500/10 border-2 border-blue-500/30 py-3 rounded-xl block";
                timerDisplay.className = "text-8xl font-light tracking-tighter text-white tabular-nums my-2";
            } else {
                currentPhaseElement.className = "w-full text-3xl font-black uppercase tracking-wider text-emerald-400 bg-emerald-500/10 border-2 border-emerald-500/30 py-3 rounded-xl block";
                timerDisplay.className = "text-8xl font-light tracking-tighter text-emerald-400 tabular-nums my-2";
            }
        }

        function playAlertSound() {
            alertSound.currentTime = 0;
            alertSound.play().catch(e => console.log("Audio unlock triggered"));
        }

        function toggleTimer() {
            playAlertSound(); 
            setTimeout(() => { alertSound.pause(); alertSound.currentTime = 0; }, 100);

            if (isRunning) {
                clearInterval(timer);
                iconPlay.setAttribute('data-lucide', 'play');
                textPlay.textContent = "Start Timer";
                isRunning = false;
            } else {
                // Nếu bắt đầu từ trạng thái reset hoặc lần đầu tiên bấm: Ép nhảy vào 10s chuẩn bị trước
                if (!hasInitializedPrep && currentMode === MODES.FOCUS && timeRemaining === MODES.FOCUS.minutes * 60) {
                    currentMode = MODES.COUNTDOWN;
                    timeRemaining = MODES.COUNTDOWN.seconds;
                    hasInitializedPrep = true;
                    updateGauges();
                }

                isRunning = true;
                iconPlay.setAttribute('data-lucide', 'pause');
                textPlay.textContent = "Pause Timer";
                timer = setInterval(() => {
                    if (timeRemaining > 0) {
                        timeRemaining--;
                        updateTimerDisplay();
                    } else {
                        handlePhaseEnd();
                    }
                }, 1000);
            }
            lucide.createIcons();
        }

        function handlePhaseEnd() {
            playAlertSound();
            clearInterval(timer);
            isRunning = false;

            if (currentMode.isPrep) {
                // Hết 10 giây chuẩn bị -> Chuyển sang Focus
                currentMode = MODES.FOCUS;
                timeRemaining = currentMode.minutes * 60;
            } else if (currentMode === MODES.FOCUS) {
                // Hết Focus -> Chuyển sang Short Break luôn (Bỏ Long Break)
                currentMode = MODES.SHORT;
                timeRemaining = currentMode.minutes * 60;
            } else {
                // Hết Short Break -> Quay lại Focus và tăng cycle
                currentCycle++;
                currentMode = MODES.FOCUS;
                timeRemaining = currentMode.minutes * 60;
                hasInitializedPrep = false; // Reset cờ để vòng kế tiếp lại có 10s chuẩn bị
            }

            iconPlay.setAttribute('data-lucide', 'play');
            textPlay.textContent = "Start Timer";
            
            updateGauges();
            updateTimerDisplay();
            lucide.createIcons();
            toggleTimer(); // Chạy tự động chu kỳ tiếp theo
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            currentMode = MODES.FOCUS;
            timeRemaining = currentMode.minutes * 60;
            hasInitializedPrep = false;
            iconPlay.setAttribute('data-lucide', 'play');
            textPlay.textContent = "Start Timer";
            updateTimerDisplay();
            updateGauges();
            lucide.createIcons();
        }

        function skipTimer() {
            clearInterval(timer);
            isRunning = false;
            handlePhaseEnd();
        }

        // --- ACHIEVEMENT MANAGEMENT ---
        const achievementPercent = document.getElementById('achievement-percent');
        const achievementBar = document.getElementById('achievement-bar');

        function adjustProgress(amount) {
            currentProgress += amount;
            if (currentProgress < 0) currentProgress = 0;
            if (currentProgress > 100) currentProgress = 100;
            
            achievementPercent.textContent = `${currentProgress}%`;
            achievementBar.style.width = `${currentProgress}%`;
        }

        // --- INTERACTIVE THOUGHT POPUP ---
        const thoughtsInput = document.getElementById('thoughts-input');
        const popupText = document.getElementById('popup-text');
        const streamPopup = document.getElementById('stream-popup');

        function publishThought() {
            const text = thoughtsInput.value.trim();
            if (text !== "") {
                popupText.textContent = text;
                streamPopup.classList.add('show');
            }
        }

        function clearThought() {
            streamPopup.classList.remove('show');
            thoughtsInput.value = "";
        }

        // Initialize UI Elements
        lucide.createIcons();
        updateTimerDisplay();
        updateGauges();
    </script>
</body>
</html>
